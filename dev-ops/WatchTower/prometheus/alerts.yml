groups:
  - name: watchtower-alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "More than 5% of requests for {{ $labels.job }} are returning 5xx errors over 5 minutes."

      - alert: ServiceNotScraping
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus is not scraping {{ $labels.job }}"
          description: "Prometheus has not received metrics from {{ $labels.job }} for more than 2 minutes."
